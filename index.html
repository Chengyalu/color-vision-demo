<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 960px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
      line-height: 1.6;
      color: #222;
    }
    h1 {
      margin-bottom: 8px;
    }

      color: #555;

    }
    video {
      width: 100%;
      max-width: 900px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
    }

  <h1>Color Vision Deficiency Enhancement Demo</h1>
  <p>
    A short demonstration video of the project.
  </p>

  <div class="video-box">
    <video controls preload="metadata">
      <source src="demo.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</body>
</html>
